<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mahjong Bot</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      padding: 12px 12px 90px;
    }
    h2 {
      font-size: 1rem;
      margin: 18px 0 8px;
      color: var(--tg-theme-hint-color, #888);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .row { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      border: 1px solid var(--tg-theme-hint-color, #ccc);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.85rem;
      background: var(--tg-theme-secondary-bg-color, #f2f2f2);
      color: inherit;
      cursor: pointer;
      user-select: none;
      position: relative;
    }
    .chip.selected {
      background: var(--tg-theme-button-color, #2ea6ff);
      color: var(--tg-theme-button-text-color, #fff);
      border-color: transparent;
    }
    .tile-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 4px; }
    .tile {
      border: 1px solid var(--tg-theme-hint-color, #ccc);
      border-radius: 6px;
      padding: 6px 0;
      text-align: center;
      font-size: 0.75rem;
      background: var(--tg-theme-secondary-bg-color, #f2f2f2);
      cursor: pointer;
      position: relative;
    }
    .tile.selected, .chip.selected { background: var(--tg-theme-button-color, #2ea6ff); color: #fff; }
    .count {
      position: absolute;
      top: -6px;
      right: -6px;
      background: #ff5252;
      color: #fff;
      border-radius: 50%;
      width: 17px;
      height: 17px;
      font-size: 0.65rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #handSummary { margin-top: 10px; font-size: 0.85rem; color: var(--tg-theme-hint-color, #888); }
    #submitBtn {
      position: fixed;
      bottom: 16px;
      left: 12px;
      right: 12px;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: var(--tg-theme-button-color, #2ea6ff);
      color: var(--tg-theme-button-text-color, #fff);
      font-size: 1rem;
      font-weight: 600;
    }
    #submitBtn:disabled { opacity: 0.4; }
  </style>
</head>
<body>
  <h2>Winner</h2>
  <div class="row" id="winnerRow"></div>

  <h2>Win Type</h2>
  <div class="row">
    <div class="chip" id="selfDrawChip">Self-Draw</div>
    <div class="chip selected" id="discardChip">Won off Discard</div>
  </div>

  <div id="discarderSection">
    <h2>Discarder</h2>
    <div class="row" id="discarderRow"></div>
  </div>

  <h2>Seat Wind (winner)</h2>
  <div class="row" id="seatWindRow"></div>

  <h2>Round Wind</h2>
  <div class="row" id="roundWindRow"></div>

  <h2>Hand Tiles (tap to add, tap at max to clear)</h2>
  <div class="tile-grid" id="bambooGrid"></div>
  <div class="tile-grid" id="characterGrid" style="margin-top:4px"></div>
  <div class="tile-grid" id="dotGrid" style="margin-top:4px"></div>
  <div class="row" style="margin-top:4px" id="honorRow"></div>

  <h2>Bonus Tiles (flowers / animals)</h2>
  <div class="row" id="bonusRow"></div>

  <div id="handSummary"></div>

  <button id="submitBtn" disabled>Submit (0/14 tiles)</button>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const params = new URLSearchParams(window.location.search);
    const players = (params.get("players") || "Player1,Player2,Player3,Player4").split(",");

    const state = {
      winner: null,
      selfDraw: false,
      discarder: null,
      seatWind: "EW",
      roundWind: "EW",
      tiles: {}, // code -> count
    };

    function renderPlayerRow(container, key) {
      container.innerHTML = "";
      players.forEach((name) => {
        const chip = document.createElement("div");
        chip.className = "chip";
        chip.textContent = name;
        chip.onclick = () => {
          state[key] = name;
          [...container.children].forEach((c) => c.classList.remove("selected"));
          chip.classList.add("selected");
          updateSubmit();
        };
        container.appendChild(chip);
      });
    }

    function renderWindRow(container, key, defaultVal) {
      container.innerHTML = "";
      const winds = [["EW", "East"], ["SW", "South"], ["WW", "West"], ["NW", "North"]];
      winds.forEach(([code, label]) => {
        const chip = document.createElement("div");
        chip.className = "chip" + (code === defaultVal ? " selected" : "");
        chip.textContent = label;
        chip.onclick = () => {
          state[key] = code;
          [...container.children].forEach((c) => c.classList.remove("selected"));
          chip.classList.add("selected");
        };
        container.appendChild(chip);
      });
    }

    function tileCount() {
      return Object.entries(state.tiles)
        .filter(([code]) => !code.startsWith("F") && !code.startsWith("AN"))
        .reduce((sum, [, n]) => sum + n, 0);
    }

    function maxForTile(code) {
      if (code.startsWith("F") || code.startsWith("AN")) return 1;
      return 4;
    }

    function renderTileGrid(container, codes, labels) {
      container.innerHTML = "";
      codes.forEach((code, i) => {
        const div = document.createElement("div");
        div.className = "tile";
        div.textContent = labels[i];
        div.dataset.code = code;
        div.onclick = () => addTile(code);
        container.appendChild(div);
      });
    }

    function addTile(code) {
      const current = state.tiles[code] || 0;
      const isBonus = code.startsWith("F") || code.startsWith("AN");
      if (!isBonus && tileCount() >= 14 && current === 0) return;
      if (current >= maxForTile(code)) {
        delete state.tiles[code];
      } else {
        state.tiles[code] = current + 1;
      }
      renderCounts();
      updateSubmit();
    }

    function renderCounts() {
      document.querySelectorAll(".tile[data-code], .chip[data-code]").forEach((el) => {
        const code = el.dataset.code;
        const n = state.tiles[code] || 0;
        let badge = el.querySelector(".count");
        if (n > 0) {
          if (!badge) {
            badge = document.createElement("div");
            badge.className = "count";
            el.appendChild(badge);
          }
          badge.textContent = n;
          el.classList.add("selected");
        } else {
          if (badge) badge.remove();
          el.classList.remove("selected");
        }
      });
      document.getElementById("handSummary").textContent = `${tileCount()}/14 playing tiles selected`;
    }

    function updateSubmit() {
      const btn = document.getElementById("submitBtn");
      const n = tileCount();
      const ready = state.winner && n === 14 && (state.selfDraw || state.discarder);
      btn.disabled = !ready;
      btn.textContent = `Submit (${n}/14 tiles)`;
    }

    renderPlayerRow(document.getElementById("winnerRow"), "winner");

    document.getElementById("selfDrawChip").onclick = () => {
      state.selfDraw = true;
      document.getElementById("selfDrawChip").classList.add("selected");
      document.getElementById("discardChip").classList.remove("selected");
      document.getElementById("discarderSection").style.display = "none";
      updateSubmit();
    };
    document.getElementById("discardChip").onclick = () => {
      state.selfDraw = false;
      document.getElementById("discardChip").classList.add("selected");
      document.getElementById("selfDrawChip").classList.remove("selected");
      document.getElementById("discarderSection").style.display = "block";
      updateSubmit();
    };

    renderPlayerRow(document.getElementById("discarderRow"), "discarder");
    renderWindRow(document.getElementById("seatWindRow"), "seatWind", "EW");
    renderWindRow(document.getElementById("roundWindRow"), "roundWind", "EW");

    const bamboo = [1, 2, 3, 4, 5, 6, 7, 8, 9].map((n) => `${n}B`);
    const character = [1, 2, 3, 4, 5, 6, 7, 8, 9].map((n) => `${n}C`);
    const dot = [1, 2, 3, 4, 5, 6, 7, 8, 9].map((n) => `${n}D`);
    renderTileGrid(document.getElementById("bambooGrid"), bamboo, bamboo.map((c) => c[0] + "🎋"));
    renderTileGrid(document.getElementById("characterGrid"), character, character.map((c) => c[0] + "萬"));
    renderTileGrid(document.getElementById("dotGrid"), dot, dot.map((c) => c[0] + "⊙"));

    const honors = [
      ["EW", "East"], ["SW", "South"], ["WW", "West"], ["NW", "North"],
      ["RD", "Red Dragon"], ["GD", "Green Dragon"], ["WD", "White Dragon"],
    ];
    const honorRow = document.getElementById("honorRow");
    honors.forEach(([code, label]) => {
      const chip = document.createElement("div");
      chip.className = "chip";
      chip.dataset.code = code;
      chip.textContent = label;
      chip.onclick = () => addTile(code);
      honorRow.appendChild(chip);
    });

    const bonusTiles = [
      ["F1", "🌸 Flower 1"], ["F2", "🌸 Flower 2"], ["F3", "🌸 Flower 3"], ["F4", "🌸 Flower 4"],
      ["AN1", "🐀 Rat"], ["AN2", "🐱 Cat"], ["AN3", "🐓 Rooster"], ["AN4", "🐛 Centipede"],
    ];
    const bonusRow = document.getElementById("bonusRow");
    bonusTiles.forEach(([code, label]) => {
      const chip = document.createElement("div");
      chip.className = "chip";
      chip.dataset.code = code;
      chip.textContent = label;
      chip.onclick = () => addTile(code);
      bonusRow.appendChild(chip);
    });

    document.getElementById("submitBtn").onclick = () => {
      const tileList = [];
      Object.entries(state.tiles).forEach(([code, n]) => {
        for (let i = 0; i < n; i++) tileList.push(code);
      });
      const payload = {
        winner: state.winner,
        self_draw: state.selfDraw,
        discarder: state.selfDraw ? null : state.discarder,
        seat_wind: state.seatWind,
        round_wind: state.roundWind,
        tiles: tileList,
      };
      tg.sendData(JSON.stringify(payload));
      tg.close();
    };

    updateSubmit();
  </script>
</body>
</html>
